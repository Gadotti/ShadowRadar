<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#00c86e" stroke-width="1.5"/>
  <!-- Mid ring -->
  <circle cx="16" cy="16" r="9"  fill="none" stroke="#00c86e" stroke-width="1"   opacity="0.55"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#00c86e" stroke-width="0.8" opacity="0.35"/>
  <!-- Sweep line (pointing ~40°) -->
  <line x1="16" y1="16" x2="26.7" y2="6.9" stroke="#00c86e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Blip -->
  <circle cx="24" cy="9" r="1.6" fill="#00c86e"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.2" fill="#00c86e"/>
</svg>
